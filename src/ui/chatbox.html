<html window-resizable>
    <head>
        <style>
            @import url(common.css);
            @media platform != "OSX" {
                body {
                    border-top: color(border) solid 1px;
                }
            }
        </style>
        <script type="text/tiscript">
            include "common.tis";
            var p = view.parameters;
            view.refresh = function() {
                var draft_input = $(input);
                var draft = draft_input ? (draft_input.value || "") : "";
                $(body).content(<ChatBox msgs={p.msgs} callback={p.callback} />);
                var next_input = $(input);
                if (next_input) next_input.value = draft;
                view.focus = $(input);
            }
            function self.closing() {
                view.windowState = View.WINDOW_HIDDEN;
                return false;
            }
            view.windowIcon = self.url(p.icon);
            function self.ready() {
                view.windowTopmost = true;
                view.refresh();
                view.windowTopmost = false;
            }
        </script>
    </head>
    <body></body>
</html>


<style>
html, body {
  background: #0A0F14 !important;
  color: #E6F7FB !important;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("common/sln_logo_bg.png") center center / 42% no-repeat;
  opacity: 0.08;
  pointer-events: none;
  z-index: 0;
}
body > * {
  position: relative;
  z-index: 1;
}
button, .button, input[type="button"], input[type="submit"] {

}
input, textarea, select {
  background: #101820 !important;

  border: 1px solid #1E2B36 !important;
}
.sidebar, .panel, .card, .box, .container {

  border-color: #1E2B36 !important;
}
a, .link, .active, .primary {

}
.title, .brand, .logo-text, h1, h2, h3 {

}
</style>
